# Game-specific binary patches consumed by `wie_core_arm::install_binary_patches`.
#
# Each `[[entry]]` is either:
#   - hash-keyed: `hash` is the MD5 of the main guest binary (KTF
#     `client.bin`, LGT `binary.mod`, etc.). Matched and installed on boot.
#   - pattern-only (hash omitted): generic patterns that apply to any binary
#     matching the bytes. Hash-keyed entries take priority.
#
# Hook `pc`/`exit_pc` MUST have the Thumb bit (LSB=1); ARM-mode hooks are
# not supported. Stack offsets are signed and measured from R7 (Thumb
# frame pointer).
#
# A hook is either pc-based (`pc = ...`) or pattern-based (`pattern = ...`),
# never both. Pattern tokens are whitespace-separated and each token is one of:
#   - `??`        — any byte (unnamed wildcard)
#   - `xx`        — literal hex byte
#   - `{dst}`     — 1 byte, Thumb1 `SUBS Rn, #imm8` imm8 → `-(b as i8) as i32`
#   - `{src}`     — same, src offset
#   - `{len}`     — same, len offset (omit capture + provide `len_offset` to pin)
#   - `{exit_b}`  — TWO consecutive tokens, encoding a Thumb `B imm11` instruction
#
# `inline_copy` fixed fields:
#   - `len_offset`   — R7-relative offset of the length variable. Required if
#                      the pattern has no `{len}` capture; forbidden if it does.
#   - `spill_back`   — after the copy, also write back `dst += len`, `src += len`,
#                      `len = 0` into their stack slots. Set true when the code
#                      after the loop re-reads those variables.
#
# `inline_copy` requires the loop to use a DOWN-counter (length stored on the
# stack and decremented to 0 to exit). UP-counter loops are NOT compatible —
# zeroing the slot just resets the index and the loop restarts.
#
# In addition to hooks, an entry may contain `[[entry.patch]]` items that
# rewrite raw bytes at install time (no SVC, no runtime dispatch). A patch is
# either pc-based (`pc = 0x...`, requires the entry's `hash`) or pattern-based
# (`pattern = "..."`, applied at every match).
#   - `bytes`  : whitespace-separated hex literals. Length >= 1. May not
#                contain the SVC #0x80 instruction (`80 df` LE).
#   - `expect` : optional original bytes; same length as `bytes`. Strongly
#                recommended — install fails fast on a build mismatch.
#   - `offset` : pattern-only. Bytes are written at `match_addr + offset`.
#                Default 0. Range `0 ..= pattern_len - bytes_len`.
# Patch patterns may use `??`, hex literals, and `0b<bits>` BitMatch with no
# register placeholders. They may NOT use `{dst}`/`{src}`/`{len}`/`{exit_b}`
# captures or `s`/`d`/`c` BitMatch placeholders — patches have no captures to
# consume.
#
# Install order: patches first, hooks second. Patch ↔ patch and patch ↔ hook
# SVC overlap fails the install. A hash-keyed entry that produces zero
# patches/hooks is fatal (likely a stale entry against an updated binary);
# generic (hash-less) entries warn and continue.

[[entry]]
name = "Generic compiler library / inline copy patterns"

# Per-frame byte-by-byte memcpy with `src/dst/count` in registers.
# Loop:
#   LDRB R3, [Rsrc];   STRB R3, [Rdst]
#   MOV  R3, Rcount;   ADDS Rsrc, #1; ADDS Rdst, #1; SUBS Rcount, #1
#   CMP  R3, #0;       BGT loop
# `Rcount` holds `remaining - 1`, so actual byte count is `Rcount + 1`.
# Seen as the dominant per-frame hot path in mgh2's `copy_offscreen_to_screen`.
# Bit-pattern tokens use `s`/`d`/`c` to capture src/dst/count register fields;
# `exit_pc` is auto-derived as `match_end | 1` (right past the BGT).
[[entry.hook]]
kind = "reg_inline_copy"
pattern = "0b00sss011 78 0b00ddd011 70 0b00ccc011 1c 01 0b00110sss 01 0b00110ddd 01 0b00111ccc 00 2b f7 dc"
count_offset = 1

# Thumb -O0 byte copy: `*dst++ = *src++` with `dst`/`src`/`len` all on the
# stack. Src is reached via single-instruction `SUBS R4, R7, #4` (`3c 1f`),
# so `src_offset` is pinned.
[[entry.hook]]
kind = "inline_copy"
pattern = "3d 1c {dst} 3d 29 68 3c 1f 22 68 08 1c 13 1c 1b 78 03 70 01 32 22 60 01 31 29 60 {exit_b} {exit_b}"
src_offset = -4
len_offset = -12
spill_back = true

# RVCT __rt_memcpy / __rt_memset reached through a Thumb `BX PC` thunk.
# Prefix `BX PC; NOP; STMFD SP!, {R0, LR}; CMP R2, #N` is specific to the
# standard library helpers; the trailing `CMP R2` immediate is what
# distinguishes them (`#3` for memcpy, `#4` for memset).
[[entry.hook]]
kind = "memcpy"
pattern = "78 47 00 00 01 40 2d e9 03 00 52 e3"

[[entry.hook]]
kind = "memset"
pattern = "78 47 00 00 01 40 2d e9 04 00 52 e3"

# RVCT Thumb strcpy / strlen with Mycroft's NUL-byte detection
# (`0xFEFEFEFF`/`0x80808080` magic words).
[[entry.hook]]
kind = "strcpy"
pattern = "70 b5 0b 1c 03 43 03 22 13 40 04 1c"

[[entry.hook]]
kind = "strlen"
pattern = "30 b5 03 23 03 40 04 1c 00 2b"
